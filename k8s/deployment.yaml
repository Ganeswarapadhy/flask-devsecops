apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-devsecops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-devsecops
  template:
    metadata:
      labels:
        app: flask-devsecops
    spec:
      containers:
        - name: flask-app
          image:  ganeswara/flask-devsecops:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000